sonar.projectKey=rekyb_marka-editor
sonar.projectName=Marka Editor
sonar.projectVersion=0.1.0
sonar.organization=rekyb

sonar.sources=src
sonar.exclusions=**/*.test.ts,**/*.test.tsx,node_modules/**,coverage/**,dist/**,.next/**
sonar.sourceEncoding=UTF-8

sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx
